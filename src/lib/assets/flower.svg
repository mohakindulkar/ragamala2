        </symbol>

        <symbol id="flower-bloom" viewBox="0 0 100 100">
            <path d="M50 100 Q50 80 50 70" stroke="green" fill="none" />

            <g class="bud-layer">
                <path id="petal" d="M50 70 C60 60 60 40 50 30 C40 40 40 60 50 70" fill="currentColor" />
            </g>

            <g class="partial-layer" style="--rotation: 45deg">
                <use href="#petal" transform="rotate(45 50 70)" />
                <use href="#petal" transform="rotate(-45 50 70)" />
            </g>

            <g class="full-layer">
                <use href="#petal" transform="rotate(90 50 70)" />
                <use href="#petal" transform="rotate(-90 50 70)" />
            </g>
        </symbol>
    </defs>
    <g id="test">
        <use xlink:href="#lotus"/>
    </g>
</svg>