<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" id="l" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

    <defs>
        <style>
            @keyframes kaboom {
                90% {
                    transform: scale(0.9);
                }
                100% {
                    transform: scale(1);
                }
            }

            @keyframes hideshow {
                0% { opacity: 0.0; }
                10% { opacity: 0.0; }
                15% { opacity: 0.9; }
                100% { opacity: 1.0; }
            }

            #petal {
                fill: pink;
                transition: 5 0.5s ease;
            }

            #lotus .stem {
                fill: green;
                animation: kaboom 5s ease forwards;
                animation-delay: 0;
            }


            #lotus .petals path {
                fill: white;
                animation: hideshow 6s ease forwards;
                animation-delay: 1s;
            }

            #lotus .petals path.petal-2 {
                animation-delay: 3s;
            }

            #lotus .petals path.petal-3 {
                animation-delay: 6s;
            }

            #lotus .petals path.petal-3 {
                animation-delay: 9s;
            }
        </style>
